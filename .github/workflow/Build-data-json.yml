name: Build data.json from DATA folder

on:
  push:
    # Only re-run when the source .txt files actually change — this
    # deliberately excludes DATA/*.json so committing the generated
    # files below doesn't re-trigger the workflow in a loop.
    paths:
      - 'DATA/*.txt'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build JSON from DATA/*.txt
        run: node scripts/build-data-json.mjs

      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add DATA/all-data.json DATA/index.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild data.json from DATA folder"
            git push
          fi
